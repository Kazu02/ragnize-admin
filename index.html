// ==================== Utility ====================
const downloadCSV = (data, filename) => {
  if (!data || data.length === 0) return;
  const headers = Object.keys(data[0]).join(',');
  const rows = data.map(row => Object.values(row).map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const csv = '﻿' + headers + '\n' + rows;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
};

const fmt = (n) => Number(n).toLocaleString();
const fmtY = (n) => '¥' + Number(n).toLocaleString();

const statusBadge = (status) => {
  const map = {
    '有効':'bg-green-100 text-green-700','契約中':'bg-green-100 text-green-700',
    '入金済':'bg-green-100 text-green-700','締結済':'bg-green-100 text-green-700',
    '公開中':'bg-green-100 text-green-700','完了':'bg-green-100 text-green-700',
    '審査中':'bg-orange-100 text-orange-700','署名中':'bg-orange-100 text-orange-700',
    '送信済':'bg-orange-100 text-orange-700','予約済':'bg-orange-100 text-orange-700',
    'トライアル':'bg-blue-100 text-blue-700','発行済':'bg-blue-100 text-blue-700',
    '準備中':'bg-blue-100 text-blue-700',
    '停止':'bg-red-100 text-red-700','停止中':'bg-red-100 text-red-700',
    '未入金':'bg-red-100 text-red-700','失敗':'bg-red-100 text-red-700',
    '下書き':'bg-slate-100 text-slate-600',
  };
  const cls = map[status] || 'bg-slate-100 text-slate-600';
  return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${cls}`}>{status}</span>;
};

// ==================== Toast ====================
const Toast = ({ toasts, removeToast }) => (
  <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2">
    {toasts.map(t => (
      <div key={t.id} className={`flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-white text-sm
        ${t.type==='success'?'bg-green-600':t.type==='error'?'bg-red-600':t.type==='warning'?'bg-orange-500':'bg-blue-600'}`}>
        <span>{t.type==='success'?'✓':t.type==='error'?'✗':t.type==='warning'?'⚠':'ℹ'}</span>
        <span>{t.message}</span>
        <button onClick={()=>removeToast(t.id)} className="ml-2 opacity-70 hover:opacity-100">×</button>
      </div>
    ))}
  </div>
);

// ==================== Modal Base ====================
const Modal = ({ title, onClose, children, size='lg' }) => {
  const sizes = { sm:'max-w-sm', md:'max-w-md', lg:'max-w-lg', xl:'max-w-2xl', '2xl':'max-w-4xl' };
  return (
    <div className="fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4" onClick={(e)=>{if(e.target===e.currentTarget)onClose();}}>
      <div className={`bg-white rounded-xl shadow-2xl w-full ${sizes[size]||sizes.lg} max-h-[90vh] overflow-y-auto`}>
        <div className="flex items-center justify-between p-6 border-b sticky top-0 bg-white">
          <h2 className="text-lg font-semibold text-slate-800">{title}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
};

const BtnSecondary = ({ children, ...props }) => <button {...props} className={`bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium ${props.className||''}`}>{children}</button>;

// ==================== Modal Renderer ====================
const ModalRenderer = ({ modal, setModal, data, setData, showToast }) => {
  const close = () => setModal(null);

  if (modal.type === 'confirm') {
    const { title, message, onConfirm } = modal.data;
    return (
      <Modal title={title||'確認'} onClose={close} size="sm">
        <p className="text-slate-600 mb-6">{message}</p>
        <div className="flex justify-end gap-3">
          <BtnSecondary onClick={close}>キャンセル</BtnSecondary>
          <BtnPrimary onClick={()=>{ onConfirm(); close(); }}>実行する</BtnPrimary>
        </div>
      </Modal>
    );
  }

  if (modal.type === 'agencyNew' || modal.type === 'agencyEdit') {
    const isEdit = modal.type === 'agencyEdit';
    const orig = isEdit ? modal.data : {};
    const [form, setForm] = React.useState({ name:'', code:'', status:'有効', startDate:'', ...orig });
    const save = () => {
      if (!form.name || !form.code) { showToast('必須項目を入力してください','error'); return; }
      if (isEdit) {
        setData(prev=>({...prev, agencies: prev.agencies.map(a=>a.id===form.id?{...form}:a)}));
      } else {
        const newItem = {...form, id:'AG'+Date.now(), subCount:0, tenantCount:0, mrr:0, commission:0};
        setData(prev=>({...prev, agencies:[...prev.agencies, newItem]}));
      }
      showToast(isEdit?'代理店情報を保存しました':'代理店を登録しました');
      close();
    };
    const del = () => {
      setData(prev=>({...prev, agencies:prev.agencies.filter(a=>a.id!==form.id)}));
      showToast('代理店を削除しました','warning'); close();
    };
    return (
      <Modal title={isEdit?'代理店編集':'代理店新規登録'} onClose={close}>
        <FormField label="代理店名" required><Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="㈱サンプル"/></FormField>
        <FormField label="代理店コード" required><Input value={form.code} onChange={e=>setForm({...form,code:e.target.value})} placeholder="XX-001"/></FormField>
        <FormField label="ステータス"><Select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>有効</option><option>審査中</option><option>停止</option></Select></FormField>
        <FormField label="契約開始日"><Input type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})}/></FormField>
        <div className="flex justify-between mt-6">
          {isEdit ? <BtnDanger onClick={del}>削除</BtnDanger> : <div/>}
          <div className="flex gap-3"><BtnSecondary onClick={close}>キャンセル</BtnSecondary><BtnPrimary onClick={save}>保存</BtnPrimary></div>
        </div>
      </Modal>
    );
  }

  if (modal.type === 'subagencyNew' || modal.type === 'subagencyEdit') {
    const isEdit = modal.type === 'subagencyEdit';
    const orig = isEdit ? modal.data : {};
    const [form, setForm] = React.useState({ name:'', code:'', parentAgency:'', status:'有効', ...orig });
    const save = () => {
      if (!form.name || !form.code) { showToast('必須項目を入力してください','error'); return; }
      if (isEdit) {
        setData(prev=>({...prev, subagencies: prev.subagencies.map(a=>a.id===form.id?{...form}:a)}));
      } else {
        setData(prev=>({...prev, subagencies:[...prev.subagencies, {...form, id:'SA'+Date.now(), tenantCount:0, mrr:0, commission:0}]}));

        <div className="flex justify-end gap-3 mt-6"><BtnSecondary onClick={close}>キャンセル</BtnSecondary><BtnPrimary onClick={save}>保存</BtnPrimary></div>
      </Modal>
    );
  }

  if (modal.type === 'tenantNew' || modal.type === 'tenantEdit') {
    const isEdit = modal.type === 'tenantEdit';

    const [form, setForm] = React.useState({ name:'', agency:'', mrr:0, startDate:'', status:'契約中', products:'', ...orig });

      if (!form.name) { showToast('テナント名は必須です','error'); return; }
      const item = {...form, mrr:Number(form.mrr), products: form.products?form.products.split(',').map(s=>s.trim()):[]};
      if (isEdit) {
        setData(prev=>({...prev, tenants:prev.tenants.map(t=>t.id===item.id?item:t)}));
      } else {
        setData(prev=>({...prev, tenants:[...prev.tenants, {...item,id:'TN'+Date.now()}]}));

      showToast(isEdit?'テナント情報を保存しました':'テナントを登録しました'); close();
    };
    return (
      <Modal title={isEdit?'テナント編集':'テナント新規登録'} onClose={close}>
        <FormField label="テナント名" required><Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></FormField>
        <FormField label="代理店"><Select value={form.agency} onChange={e=>setForm({...form,agency:e.target.value})}>
          <option value="">直販</option>
          {data.agencies.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}
        </Select></FormField>
        <FormField label="利用製品（カンマ区切り）"><Input value={form.products} onChange={e=>setForm({...form,products:e.target.value})} placeholder="ナツメAI, 架電AI"/></FormField>
        <FormField label="MRR (円)"><Input type="number" value={form.mrr} onChange={e=>setForm({...form,mrr:e.target.value})}/></FormField>
        <FormField label="契約開始月"><Input type="month" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})}/></FormField>
        <FormField label="ステータス"><Select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>契約中</option><option>トライアル</option><option>停止中</option></Select></FormField>
        <div className="flex justify-end gap-3 mt-6"><BtnSecondary onClick={close}>キャンセル</BtnSecondary><BtnPrimary onClick={save}>保存</BtnPrimary></div>
      </Modal>
    );
  }

  if (modal.type === 'contractNew' || modal.type === 'contractEdit') {
    const isEdit = modal.type === 'contractEdit';
    const orig = isEdit ? modal.data : {};
    const [form, setForm] = React.useState({ tenant:'', agency:'', product:'', startDate:'', endDate:'', monthlyFee:0, status:'契約中', econtract:'下書き', ...orig });
    const save = () => {
      if (!form.tenant || !form.product) { showToast('必須項目を入力してください','error'); return; }
      const item = {...form, monthlyFee:Number(form.monthlyFee)};
      if (isEdit) {
        setData(prev=>({...prev, contracts:prev.contracts.map(c=>c.id===item.id?item:c)}));
      } else {
        setData(prev=>({...prev, contracts:[...prev.contracts, {...item,id:'CT-'+Date.now()}]}));
      }
      showToast(isEdit?'契約情報を保存しました':'契約を作成しました'); close();
    };
    return (
      <Modal title={isEdit?'契約編集':'新規契約作成'} onClose={close}>
        <FormField label="テナント" required><Select value={form.tenant} onChange={e=>setForm({...form,tenant:e.target.value})}>
          <option value="">選択</option>{data.tenants.map(t=><option key={t.id}>{t.name}</option>)}
        </Select></FormField>
        <FormField label="代理店"><Select value={form.agency} onChange={e=>setForm({...form,agency:e.target.value})}>
          <option value="">直販</option>{data.agencies.map(a=><option key={a.id}>{a.name}</option>)}
        </Select></FormField>
        <FormField label="製品" required><Select value={form.product} onChange={e=>setForm({...form,product:e.target.value})}>
          <option value="">選択</option>{data.products.map(p=><option key={p.id}>{p.name}</option>)}
        </Select></FormField>
        <div className="grid grid-cols-2 gap-3">
          <FormField label="開始日"><Input type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})}/></FormField>
          <FormField label="終了日"><Input type="date" value={form.endDate} onChange={e=>setForm({...form,endDate:e.target.value})}/></FormField>
        </div>
        <FormField label="月額費用（円）"><Input type="number" value={form.monthlyFee} onChange={e=>setForm({...form,monthlyFee:e.target.value})}/></FormField>
        <FormField label="ステータス"><Select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>契約中</option><option>トライアル</option><option>停止中</option></Select></FormField>
        <div className="flex justify-between mt-6">
          {isEdit?<BtnDanger onClick={()=>{setData(prev=>({...prev,contracts:prev.contracts.filter(c=>c.id!==form.id)}));showToast('契約を削除しました','warning');close();}}>削除</BtnDanger>:<div/>}
          <div className="flex gap-3"><BtnSecondary onClick={close}>キャンセル</BtnSecondary><BtnPrimary onClick={save}>保存</BtnPrimary></div>
        </div>
      </Modal>
    );
  }

  if (modal.type === 'invoiceNew') {
    const [form, setForm] = React.useState({ tenant:'', month:'2025-03', basicFee:0, usageFee:0 });
    const save = () => {
      if (!form.tenant) { showToast('テナントを選択してください','error'); return; }
      const total = Number(form.basicFee) + Number(form.usageFee);
      const inv = {...form, id:'INV-'+Date.now(), total, dueDate:'2025-04-30', status:'発行済'};
      setData(prev=>({...prev, invoices:[...prev.invoices, inv]}));
      showToast('請求書を発行しました'); close();
    };
    return (
      <Modal title="請求書発行" onClose={close}>
        <FormField label="テナント" required><Select value={form.tenant} onChange={e=>setForm({...form,tenant:e.target.value})}>
          <option value="">選択</option>{data.tenants.map(t=><option key={t.id}>{t.name}</option>)}
        </Select></FormField>
        <FormField label="請求月"><Input type="month" value={form.month} onChange={e=>setForm({...form,month:e.target.value})}/></FormField>
        <FormField label="基本料金（円）"><Input type="number" value={form.basicFee} onChange={e=>setForm({...form,basicFee:e.target.value})}/></FormField>
        <FormField label="従量料金（円）"><Input type="number" value={form.usageFee} onChange={e=>setForm({...form,usageFee:e.target.value})}/></FormField>
        <div className="bg-slate-50 rounded-lg p-3 mb-4">
          <span className="text-sm text-slate-600">合計: </span>
          <span className="font-bold text-slate-800">{fmtY(Number(form.basicFee)+Number(form.usageFee))}</span>
        </div>
        <div className="flex justify-end gap-3"><BtnSecondary onClick={close}>キャンセル</BtnSecondary><BtnPrimary onClick={save}>発行する</BtnPrimary></div>
      </Modal>
    );
  }

  if (modal.type === 'productNew' || modal.type === 'productEdit') {
    const isEdit = modal.type === 'productEdit';
    const orig = isEdit ? modal.data : {};
    const [form, setForm] = React.useState({ name:'', category:'音声AI', billingType:'月額+従量', basicFee:0, initialFee:0, agencyRate:20, subagencyRate:10, status:'有効', ...orig });
    const save = () => {
      if (!form.name) { showToast('製品名は必須です','error'); return; }
      const item = {...form, basicFee:Number(form.basicFee), initialFee:Number(form.initialFee), agencyRate:Number(form.agencyRate), subagencyRate:Number(form.subagencyRate)};
      if (isEdit) {
        setData(prev=>({...prev, products:prev.products.map(p=>p.id===item.id?item:p)}));
      } else {
        setData(prev=>({...prev, products:[...prev.products, {...item, id:'P'+Date.now(), usage:0}]}));
      }
      showToast(isEdit?'製品情報を保存しました':'製品を登録しました'); close();
    };
    return (
      <Modal title={isEdit?'製品編集':'製品新規登録'} onClose={close}>
        <FormField label="製品名" required><Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></FormField>
        <FormField label="カテゴリ"><Select value={form.category} onChange={e=>setForm({...form,category:e.target.value})}><option>音声AI</option><option>SaaS</option><option>トークン型</option></Select></FormField>
        <FormField label="課金タイプ"><Select value={form.billingType} onChange={e=>setForm({...form,billingType:e.target.value})}><option>月額固定</option><option>月額+従量</option><option>月額+トークン</option></Select></FormField>
        <div className="grid grid-cols-2 gap-3">
          <FormField label="基本料金（円）"><Input type="number" value={form.basicFee} onChange={e=>setForm({...form,basicFee:e.target.value})}/></FormField>
          <FormField label="初期費用（円）"><Input type="number" value={form.initialFee} onChange={e=>setForm({...form,initialFee:e.target.value})}/></FormField>
          <FormField label="代理店手数料率(%)"><Input type="number" value={form.agencyRate} onChange={e=>setForm({...form,agencyRate:e.target.value})}/></FormField>
          <FormField label="孫代理店手数料率(%)"><Input type="number" value={form.subagencyRate} onChange={e=>setForm({...form,subagencyRate:e.target.value})}/></FormField>
        </div>
        <FormField label="ステータス"><Select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>有効</option><option>準備中</option><option>停止</option></Select></FormField>
        <div className="flex justify-end gap-3 mt-6"><BtnSecondary onClick={close}>キャンセル</BtnSecondary><BtnPrimary onClick={save}>保存</BtnPrimary></div>
      </Modal>
    );
  }

  if (modal.type === 'econtractNew') {
    const [form, setForm] = React.useState({ tenant:'', type:'新規契約', contractId:'' });
    const save = () => {
      if (!form.tenant) { showToast('テナントを選択してください','error'); return; }
      const item = {...form, id:'ES-'+Date.now(), sentDate:'2025-03-15', signedDate:'-', status:'送信済'};
      setData(prev=>({...prev, econtracts:[...prev.econtracts, item]}));
      showToast('電子契約を送信しました'); close();
    };
    return (
      <Modal title="電子契約新規送信" onClose={close}>
        <FormField label="テナント" required><Select value={form.tenant} onChange={e=>setForm({...form,tenant:e.target.value})}>
          <option value="">選択</option>{data.tenants.map(t=><option key={t.id}>{t.name}</option>)}
        </Select></FormField>
        <FormField label="契約種別"><Select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}><option>新規契約</option><option>更新契約</option><option>トライアル</option></Select></FormField>
        <FormField label="関連契約ID"><Select value={form.contractId} onChange={e=>setForm({...form,contractId:e.target.value})}>
          <option value="">選択（任意）</option>{data.contracts.map(c=><option key={c.id}>{c.id}</option>)}
        </Select></FormField>
        <div className="flex justify-end gap-3 mt-6"><BtnSecondary onClick={close}>キャンセル</BtnSecondary><BtnPrimary onClick={save}>送信する</BtnPrimary></div>
      </Modal>
    );
  }

  if (modal.type === 'noticeEdit') {
    const orig = modal.data || {};
    const [form, setForm] = React.useState({ title:'', target:'全ユーザー', publishDate:'', endDate:'', status:'下書き', body:'', ...orig });
    const save = (status) => {
      if (!form.title) { showToast('タイトルは必須です','error'); return; }
      const item = {...form, status};
      if (form.id) {
        setData(prev=>({...prev, notices:prev.notices.map(n=>n.id===item.id?item:n)}));
      } else {
        setData(prev=>({...prev, notices:[...prev.notices, {...item, id:'NT'+Date.now()}]}));
      }
      showToast(status==='公開中'?'お知らせを公開しました':'下書きを保存しました'); close();
    };
    return (
      <Modal title={form.id?'お知らせ編集':'お知らせ作成'} onClose={close} size="xl">
        <FormField label="タイトル" required><Input value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></FormField>
        <div className="grid grid-cols-2 gap-3">
          <FormField label="配信対象"><Select value={form.target} onChange={e=>setForm({...form,target:e.target.value})}><option>全ユーザー</option><option>代理店以上</option><option>代理店のみ</option><option>テナントのみ</option></Select></FormField>
          <FormField label="ステータス"><Select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>下書き</option><option>予約済</option><option>公開中</option></Select></FormField>
          <FormField label="公開開始日"><Input type="date" value={form.publishDate} onChange={e=>setForm({...form,publishDate:e.target.value})}/></FormField>
          <FormField label="公開終了日"><Input type="date" value={form.endDate} onChange={e=>setForm({...form,endDate:e.target.value})}/></FormField>
        </div>
        <FormField label="本文"><Textarea rows={5} value={form.body} onChange={e=>setForm({...form,body:e.target.value})} placeholder="お知らせ本文を入力..."/></FormField>
        <div className="flex justify-end gap-3 mt-6">
          <BtnSecondary onClick={close}>キャンセル</BtnSecondary>
          <BtnSecondary onClick={()=>save('下書き')}>下書き保存</BtnSecondary>
          <BtnPrimary onClick={()=>save('公開中')}>公開する</BtnPrimary>
        </div>
      </Modal>
    );
  }

  if (modal.type === 'permissionEdit') {
    const { role: roleName, permissions: initPerms } = modal.data;
    const [perms, setPerms] = React.useState(initPerms);
    const toggle = (key) => setPerms(p=>({...p,[key]:!p[key]}));
    return (
      <Modal title={`権限編集: ${roleName}`} onClose={close}>
        <div className="space-y-3">
          {Object.entries(perms).map(([key,val])=>(
            <label key={key} className="flex items-center justify-between p-3 bg-slate-50 rounded-lg cursor-pointer">
              <span className="text-sm text-slate-700">{key}</span>
              <div className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${val?'bg-blue-600':'bg-slate-300'}`} onClick={()=>toggle(key)}>
                <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${val?'translate-x-6':'translate-x-1'}`}/>
              </div>
            </label>
          ))}
        </div>
        <div className="flex justify-end gap-3 mt-6">
          <BtnSecondary onClick={close}>キャンセル</BtnSecondary>
          <BtnPrimary onClick={()=>{ if(modal.data.onSave) modal.data.onSave(perms); showToast('権限設定を保存しました'); close(); }}>保存</BtnPrimary>
        </div>
      </Modal>
    );
  }

  if (modal.type === 'invoiceDetail') {
    const inv = modal.data;
    return (
      <Modal title="請求書詳細" onClose={close}>
        <div className="space-y-3 text-sm">
          {[['請求書ID',inv.id],['テナント',inv.tenant],['請求月',inv.month],['基本料金',fmtY(inv.basicFee)],['従量料金',fmtY(inv.usageFee)],['合計',fmtY(inv.total)],['支払期日',inv.dueDate]].map(([k,v])=>(
            <div key={k} className="flex justify-between py-2 border-b border-slate-100">
              <span className="text-slate-500">{k}</span><span className="font-medium">{v}</span>
            </div>
          ))}
          <div className="flex justify-between py-2"><span className="text-slate-500">ステータス</span>{statusBadge(inv.status)}</div>
        </div>
        <div className="flex justify-between mt-6">
          <div>
            {inv.status!=='入金済'&&<BtnPrimary onClick={()=>{setData(prev=>({...prev,invoices:prev.invoices.map(i=>i.id===inv.id?{...i,status:'入金済'}:i)}));showToast('入金済みに更新しました');close();}}>入金済みにする</BtnPrimary>}
          </div>
          <div className="flex gap-3">
            <BtnSecondary onClick={()=>{downloadCSV([inv],'invoice-'+inv.id+'.csv');showToast('CSV出力しました');}}>CSV出力</BtnSecondary>
            <BtnSecondary onClick={close}>閉じる</BtnSecondary>
          </div>
        </div>
      </Modal>
    );
  }

  if (modal.type === 'tokenGrant') {
    const [form, setForm] = React.useState({ tenant:'', tokens:10000, note:'' });
    const grant = () => {
      if (!form.tenant) { showToast('テナントを選択してください','error'); return; }
      const tokens = Number(form.tokens);
      const amount = tokens * 0.01;
      const logs = data.tokenLogs;
      const lastBalance = logs.length>0 ? logs[logs.length-1].balance : 0;
      const item = { id:'TK'+Date.now(), tenant:form.tenant, event:'付与', tokens, unitPrice:0.01, amount, balance:lastBalance+tokens, date:new Date().toISOString().slice(0,10) };
      setData(prev=>({...prev, tokenLogs:[...prev.tokenLogs, item]}));
      showToast(`${fmt(tokens)}トークンを付与しました`); close();
    };
    return (
      <Modal title="トークン付与" onClose={close}>
        <FormField label="テナント" required><Select value={form.tenant} onChange={e=>setForm({...form,tenant:e.target.value})}>
          <option value="">選択してください</option>{data.tenants.map(t=><option key={t.id}>{t.name}</option>)}
        </Select></FormField>
        <FormField label="付与トークン数"><Input type="number" value={form.tokens} onChange={e=>setForm({...form,tokens:e.target.value})}/></FormField>
        <div className="bg-slate-50 rounded-lg p-3 mb-4">
          <span className="text-sm text-slate-600">金額換算: </span>
          <span className="font-bold text-slate-800">{fmtY(Number(form.tokens)*0.01)}</span>
        </div>
        <FormField label="備考"><Input value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="任意"/></FormField>
        <div className="flex justify-end gap-3 mt-6"><BtnSecondary onClick={close}>キャンセル</BtnSecondary><BtnPrimary onClick={grant}>付与する</BtnPrimary></div>
      </Modal>
    );
  }

  if (modal.type === 'templatePreview') {
    const { name } = modal.data;
    const sampleText = `【${name}】\n\n第1条（契約の目的）\n本契約は、甲（CLASSIX株式会社）と乙（テナント）との間において、RAGNIZEサービスの利用に関する条件を定めることを目的とする。\n\n第2条（サービスの提供）\n甲は、本契約に定める条件に従い、乙に対してRAGNIZEサービスを提供する。\n\n第3条（利用料金）\n乙は、甲に対して本契約に定める利用料金を支払う。\n\n第4条（契約期間）\n本契約の有効期間は、契約開始日より1年間とする。\n\n※ このテンプレートは編集可能です。`;
    return (
      <Modal title={`プレビュー: ${name}`} onClose={close} size="xl">
        <div className="bg-slate-50 rounded-lg p-4 text-sm text-slate-700 whitespace-pre-wrap font-mono leading-relaxed border border-slate-200">
          {sampleText}
        </div>
        <div className="flex justify-end gap-3 mt-6">
          <BtnSecondary onClick={close}>閉じる</BtnSecondary>
        </div>
      </Modal>
    );
  }

  if (modal.type === 'templateEdit') {
    const { name } = modal.data;
    const [title, setTitle] = React.useState(name);
    const [body, setBody] = React.useState(`第1条（契約の目的）\n本契約は、甲（CLASSIX株式会社）と乙（テナント）との間において、RAGNIZEサービスの利用に関する条件を定めることを目的とする。\n\n第2条（サービスの提供）\n甲は、本契約に定める条件に従い、乙に対してRAGNIZEサービスを提供する。`);
    return (
      <Modal title={`テンプレート編集: ${name}`} onClose={close} size="xl">
        <FormField label="テンプレート名"><Input value={title} onChange={e=>setTitle(e.target.value)}/></FormField>
        <FormField label="本文"><Textarea rows={10} value={body} onChange={e=>setBody(e.target.value)}/></FormField>
        <div className="flex justify-end gap-3 mt-6">
          <BtnSecondary onClick={close}>キャンセル</BtnSecondary>
          <BtnPrimary onClick={()=>{showToast('テンプレートを保存しました');close();}}>保存</BtnPrimary>
        </div>
      </Modal>
    );
  }

  return null;
};

// ==================== KPI Card ====================
const KPICard = ({ title, value, sub, color='blue', icon }) => {
  const colors = { blue:'bg-blue-50 text-blue-600', green:'bg-green-50 text-green-600', orange:'bg-orange-50 text-orange-600', red:'bg-red-50 text-red-600', purple:'bg-purple-50 text-purple-600' };
  return (
    <div className="bg-white rounded-xl shadow-sm p-5 border border-slate-100">
      <div className="flex items-start justify-between mb-3">
        <p className="text-xs text-slate-500">{title}</p>
        {icon && <span className={`w-8 h-8 rounded-lg flex items-center justify-center text-sm ${colors[color]||colors.blue}`}>{icon}</span>}
      </div>
      <p className="text-2xl font-bold text-slate-800">{value}</p>
      {sub && <p className="text-xs text-slate-400 mt-1">{sub}</p>}
    </div>
  );
};

// ==================== Table ====================
const Table = ({ cols, rows, onRowClick }) => (
  <div className="overflow-x-auto">
    <table className="w-full text-sm">
      <thead>
        <tr className="bg-slate-50 border-b border-slate-200">
          {cols.map(c=><th key={c.key||c} className="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide whitespace-nowrap">{c.label||c}</th>)}
        </tr>
      </thead>
      <tbody>
        {rows.map((row,i)=>(
          <tr key={i} onClick={()=>onRowClick&&onRowClick(row)}
            className={`border-b border-slate-100 ${onRowClick?'cursor-pointer hover:bg-blue-50':''}`}>
            {cols.map(c=>(
              <td key={c.key||c} className="px-4 py-3 text-slate-700 whitespace-nowrap">
                {c.render ? c.render(row[c.key],row) : row[c.key||c]}
              </td>
            ))}
          </tr>
        ))}
        {rows.length===0 && <tr><td colSpan={cols.length} className="px-4 py-8 text-center text-slate-400">データがありません</td></tr>}
      </tbody>
    </table>
  </div>
);

const SearchBar = ({ value, onChange, placeholder='検索...' }) => (
  <div className="relative">
    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      className="pl-9 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64"/>

);

const BillingPage = ({ data, setData, setModal, showToast }) => {
  const [tab, setTab] = React.useState('list');
  const [search, setSearch] = React.useState('');
  const [issueMonth, setIssueMonth] = React.useState('2025-03');
  const [issueTenant, setIssueTenant] = React.useState('all');
  const unpaid = data.invoices.filter(i=>i.status==='未入金');
  const filtered = data.invoices.filter(i=>i.tenant.includes(search)||i.id.includes(search));

  const closingProcess = () => setModal({ type:'confirm', data:{
    title:'月次締め処理', message:'2025年3月の月次締め処理を実行します。よろしいですか？',
    onConfirm:()=>showToast('月次締め処理を完了しました')
  }});
  const sendReminder = (inv) => setModal({ type:'confirm', data:{
    title:'督促メール送信', message:`${inv.tenant} に督促メールを送信しますか？`,
    onConfirm:()=>showToast('督促メールを送信しました')
  }});

  return (
    <div className="space-y-6">
      <div className="flex gap-3 justify-end">
        <BtnSecondary onClick={closingProcess}>月次締め処理</BtnSecondary>
        <BtnPrimary onClick={()=>setModal({type:'invoiceNew',data:{}})}>+請求書発行</BtnPrimary>
      </div>
      <div className="grid grid-cols-4 gap-4">
        <KPICard title="当月請求総額" value="¥815,000" color="blue" icon="¥"/>
        <KPICard title="入金済" value="¥85,000" color="green" icon="✓"/>
        <KPICard title="未入金" value="¥245,000" sub="2件" color="red" icon="!"/>
        <KPICard title="発行済" value="¥485,000" sub="3件" color="orange" icon="≡"/>
      </div>
      <div className="flex gap-1 border-b border-slate-200">
        {[['list','請求一覧'],['unpaid','未入金管理'],['issue','請求書発行']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            className={`px-4 py-2 text-sm font-medium border-b-2 -mb-px transition-colors ${tab===id?'border-blue-600 text-blue-600':'border-transparent text-slate-500 hover:text-slate-700'}`}>
            {label}{id==='unpaid'&&unpaid.length>0&&<span className="ml-1 bg-red-500 text-white text-xs rounded-full px-1.5">{unpaid.length}</span>}
          </button>
        ))}
      </div>
      {tab==='list' && (
        <Card>
          <CardHeader title="請求一覧">
            <SearchBar value={search} onChange={setSearch}/>
            <BtnSecondary onClick={()=>{downloadCSV(data.invoices,'invoices.csv');showToast('CSV出力しました');}}>CSV出力</BtnSecondary>
          </CardHeader>
          <Table
            cols={[{key:'id',label:'請求書ID'},{key:'tenant',label:'テナント'},{key:'month',label:'請求月'},{key:'basicFee',label:'基本料金',render:v=>fmtY(v)},{key:'usageFee',label:'従量',render:v=>fmtY(v)},{key:'total',label:'合計',render:v=>fmtY(v)},{key:'dueDate',label:'期日'},{key:'status',label:'状態',render:v=>statusBadge(v)}]}
            rows={filtered}
            onRowClick={row=>setModal({type:'invoiceDetail',data:row})}
          />
        </Card>
      )}
      {tab==='unpaid' && (
        <div className="space-y-4">
          <div className="bg-red-50 border border-red-200 rounded-xl p-4 flex items-center gap-3">
            <span className="text-red-500 text-xl">⚠</span>
            <div>
              <p className="text-sm font-medium text-red-700">未入金が {unpaid.length} 件あります</p>
              <p className="text-xs text-red-500">合計 {fmtY(unpaid.reduce((s,i)=>s+i.total,0))} が未回収です</p>
            </div>
          </div>
          <Card>
            <CardHeader title="未入金一覧"/>
            <Table
              cols={[{key:'id',label:'請求書ID'},{key:'tenant',label:'テナント'},{key:'total',label:'合計',render:v=>fmtY(v)},{key:'dueDate',label:'期日'},{key:'status',label:'状態',render:v=>statusBadge(v)},
                {key:'_',label:'操作',render:(_,row)=>(
                  <div className="flex gap-1">
                    <button onClick={e=>{e.stopPropagation();sendReminder(row);}} className="text-xs bg-orange-100 text-orange-700 hover:bg-orange-200 px-2 py-1 rounded">督促送信</button>
                    <button onClick={e=>{e.stopPropagation();setModal({type:'confirm',data:{title:'入金確認',message:`${row.tenant} (${fmtY(row.total)}) を入金済みにしますか？`,onConfirm:()=>{setData(prev=>({...prev,invoices:prev.invoices.map(i=>i.id===row.id?{...i,status:'入金済'}:i)}));showToast('入金済みに更新しました');}}});}} className="text-xs bg-green-100 text-green-700 hover:bg-green-200 px-2 py-1 rounded">入金済み</button>
                  </div>
                )}
              ]}
              rows={unpaid}
            />
          </Card>
        </div>
      )}
      {tab==='issue' && (
        <Card>
          <CardHeader title="月次一括発行"/>
          <div className="p-6 space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <div><label className="block text-sm font-medium text-slate-700 mb-1">対象月</label>
                <Input type="month" value={issueMonth} onChange={e=>setIssueMonth(e.target.value)}/></div>
              <div><label className="block text-sm font-medium text-slate-700 mb-1">対象テナント</label>
                <Select value={issueTenant} onChange={e=>setIssueTenant(e.target.value)}><option value="all">全テナント</option>{data.tenants.map(t=><option key={t.id}>{t.name}</option>)}</Select>
              </div>
            </div>
            <div className="bg-blue-50 rounded-lg p-4 text-sm text-blue-700">
              対象テナント: {data.tenants.filter(t=>t.status==='契約中').length}社 | 推定合計: {fmtY(data.tenants.filter(t=>t.status==='契約中').reduce((s,t)=>s+t.mrr,0))}
            </div>
            <BtnPrimary onClick={()=>{
  const targets = issueTenant==='all' ? data.tenants.filter(t=>t.status==='契約中') : data.tenants.filter(t=>t.name===issueTenant);
  if(targets.length===0){showToast('対象テナントがありません','warning');return;}
  const newInvoices = targets.map(t=>({
    id:'INV-'+issueMonth.replace('-','')+'-'+Date.now()+'-'+t.id,
    tenant:t.name, month:issueMonth, basicFee:t.mrr, usageFee:0, total:t.mrr,
    dueDate:issueMonth+'-28', status:'発行済'
  }));
  setData(prev=>({...prev,invoices:[...prev.invoices,...newInvoices]}));
  showToast(`${targets.length}社の請求書を発行しました`);
  setTab('list');
}}>一括発行する</BtnPrimary>
          </div>
        </Card>
      )}
    </div>
  );
};

              <button onClick={()=>setModal({type:'permissionEdit',data:{role:name,permissions:{...perms},onSave:(newPerms)=>setRolePerms(prev=>({...prev,[name]:newPerms}))}})}
                className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg">権限編集</button>
            </CardHeader>
            <div className="p-4 space-y-2">
              {Object.entries(perms).map(([key,val])=>(
                <div key={key} className="flex items-center justify-between py-1">
                  <span className="text-sm text-slate-600">{key}</span>
                  <span className={`text-xs font-medium ${val?'text-green-600':'text-slate-400'}`}>{val?'✓ 許可':'✗ 禁止'}</span>
                </div>
              ))}
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
};

// ==================== App ====================
const App = () => {
  const [page, setPage] = React.useState('dashboard');
  const [role, setRole] = React.useState('superAdmin');
  const [data, setData] = React.useState(INITIAL_DATA);
  const [toasts, setToasts] = React.useState([]);
  const [modal, setModal] = React.useState(null);

  const showToast = (message, type='success') => {
    const id = Date.now() + Math.random();
    setToasts(prev=>[...prev, {id, message, type}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)), 3500);
  };
  const removeToast = (id) => setToasts(prev=>prev.filter(t=>t.id!==id));

  const pageProps = { data, setData, setModal, showToast };

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <DashboardPage {...pageProps}/>;
      case 'sales': return <SalesPage {...pageProps}/>;
      case 'billing': return <BillingPage {...pageProps}/>;
      case 'agency': return <AgencyPage {...pageProps}/>;
      case 'subagency': return <SubAgencyPage {...pageProps}/>;
      case 'tenant': return <TenantPage {...pageProps}/>;
      case 'contract': return <ContractPage {...pageProps}/>;
      case 'product': return <ProductPage {...pageProps}/>;
      case 'pricing': return <PricingPage {...pageProps}/>;
      case 'calllog': return <CallLogPage {...pageProps}/>;
      case 'token': return <TokenPage {...pageProps}/>;
      case 'report': return <ReportPage {...pageProps}/>;
      case 'econtract': return <EContractPage {...pageProps}/>;
      case 'notice': return <NoticePage {...pageProps}/>;
      case 'permission': return <PermissionPage {...pageProps}/>;
      case 'settings': return <SettingsPage {...pageProps}/>;
      default: return <DashboardPage {...pageProps}/>;
    }
  };

  return (
    <div className="flex h-screen bg-slate-50 text-sm overflow-hidden">
      <Sidebar page={page} setPage={setPage}/>
      <div className="flex-1 flex flex-col overflow-hidden">
        <Header role={role} setRole={setRole} page={page}/>
        <main className="flex-1 overflow-y-auto p-6">
          {renderPage()}
        </main>
      </div>
      <Toast toasts={toasts} removeToast={removeToast}/>
      {modal && <ModalRenderer modal={modal} setModal={setModal} data={data} setData={setData} showToast={showToast}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
